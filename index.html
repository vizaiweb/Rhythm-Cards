        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="header">
            <div class="title-group">
                <span>🥁</span>
                <h1>節奏卡片</h1>
                <span class="badge">4/4</span>
            </div>
            <div class="top-controls">
                <div class="bpm-section">
                    <label for="bpmSlider">BPM</label>
                    <input type="range" id="bpmSlider" min="60" max="160" value="120" step="1">
                    <span class="bpm-value" id="bpmDisplay">120</span>
                </div>
                <div class="metronome-controls">
                    <label>🔔</label>
                    <button class="metro-btn" id="metroToggleBtn">關</button>
                    <div class="metro-volume">
                        <input type="range" id="metroVolumeSlider" min="0" max="100" value="60">
                        <span class="metro-vol-display" id="metroVolDisplay">60%</span>
                    </div>
                </div>
                <div class="loop-controls">
                    <label>🔁</label>
                    <select class="loop-select" id="loopSelect">
                        <option value="0">無限</option>
                        <option value="2">2 次</option>
                        <option value="4" selected>4 次</option>
                        <option value="8">8 次</option>
                        <option value="16">16 次</option>
                        <option value="32">32 次</option>
                    </select>
                </div>
                <span class="slot-counter" id="slotCounter">4 個卡槽</span>
            </div>
        </div>

        <div class="card-grid" id="cardGrid"></div>

        <div class="controls">
            <button class="btn btn-success" id="addSlotBtn"><span class="btn-icon">＋</span> 新增卡槽</button>
            <button class="btn btn-primary" id="playPauseBtn"><span class="btn-icon">▶</span> <span id="playPauseLabel">播放</span></button>
            <button class="btn" id="randomBtn"><span class="btn-icon">🎲</span> 隨機</button>
            <button class="btn btn-danger" id="clearBtn"><span class="btn-icon">🗑</span> 清空序列</button>
        </div>

        <div class="progress-area">
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <div class="status-text" id="statusText">
            🎵 點擊拍點切換模式 · 右鍵拍點設定
            <span class="hint-key">｜左鍵：正常↔三連音↔六連音 ｜右鍵：常符/連音/跨拍合併</span>
        </div>
    </div>

    <!-- 右鍵選單 -->
    <div class="context-menu" id="contextMenu">
        <div class="menu-item has-sub" id="rhythmSubMenu">
            <span class="icon">🎵</span> 常符
            <div class="sub-menu" id="rhythmSubList"></div>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item has-sub" id="tupletSubMenu">
            <span class="icon">🔀</span> 連音
            <div class="sub-menu" id="tupletSubList"></div>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item has-sub" id="mergeSubMenu">
            <span class="icon">⟐</span> 跨拍合併
            <div class="sub-menu" id="mergeSubList"></div>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item" data-action="reset">
            <span class="icon">↺</span> 重置為正常
        </div>
    </div>

    <script>
        (function() {
            // ============================================================
            //  節奏庫（16 種）
            // ============================================================
            const RHYTHM_LIBRARY = [
                { id: 'rest', pattern: ['light', 'light', 'light', 'light'] },
                { id: 'beat1', pattern: ['accent', 'light', 'light', 'light'] },
                { id: 'beat2', pattern: ['light', 'accent', 'light', 'light'] },
                { id: 'beat3', pattern: ['light', 'light', 'accent', 'light'] },
                { id: 'beat4', pattern: ['light', 'light', 'light', 'accent'] },
                { id: 'double', pattern: ['accent', 'accent', 'light', 'light'] },
                { id: 'walking', pattern: ['accent', 'light', 'accent', 'light'] },
                { id: 'diagonal', pattern: ['accent', 'light', 'light', 'accent'] },
                { id: 'middle', pattern: ['light', 'accent', 'accent', 'light'] },
                { id: 'syncop', pattern: ['light', 'accent', 'light', 'accent'] },
                { id: 'back', pattern: ['light', 'light', 'accent', 'accent'] },
                { id: 'front3', pattern: ['accent', 'accent', 'accent', 'light'] },
                { id: 'jump', pattern: ['accent', 'accent', 'light', 'accent'] },
                { id: 'triple', pattern: ['accent', 'light', 'accent', 'accent'] },
                { id: 'back3', pattern: ['light', 'accent', 'accent', 'accent'] },
                { id: 'full', pattern: ['accent', 'accent', 'accent', 'accent'] }
            ];

            // ============================================================
            //  連音類型
            // ============================================================
            const TUPLET_TYPES = [
                { id: 'quadruplet', label: '4', subDivisions: 4, cssClass: 'label-quadruplet', dotClass: 'quadruplet' },
                { id: 'triplet', label: '3', subDivisions: 3, cssClass: 'label-triplet', dotClass: 'triplet' },
                { id: 'quintuplet', label: '5', subDivisions: 5, cssClass: 'label-quintuplet', dotClass: 'quintuplet' },
                { id: 'sextuplet', label: '6', subDivisions: 6, cssClass: 'label-sextuplet', dotClass: 'sextuplet' },
                { id: 'septuplet', label: '7', subDivisions: 7, cssClass: 'label-septuplet', dotClass: 'septuplet' },
                { id: 'octuplet', label: '8', subDivisions: 8, cssClass: 'label-octuplet', dotClass: 'octuplet' }
            ];

            // ============================================================
            //  DOM
            // ============================================================
            const grid = document.getElementById('cardGrid');
            const playBtn = document.getElementById('playPauseBtn');
            const playLabel = document.getElementById('playPauseLabel');
            const randomBtn = document.getElementById('randomBtn');
            const clearBtn = document.getElementById('clearBtn');
            const addSlotBtn = document.getElementById('addSlotBtn');
            const bpmSlider = document.getElementById('bpmSlider');
            const bpmDisplay = document.getElementById('bpmDisplay');
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');
            const loopSelect = document.getElementById('loopSelect');
            const slotCounter = document.getElementById('slotCounter');
            const metroToggleBtn = document.getElementById('metroToggleBtn');
            const metroVolumeSlider = document.getElementById('metroVolumeSlider');
            const metroVolDisplay = document.getElementById('metroVolDisplay');
            const contextMenu = document.getElementById('contextMenu');
            const rhythmSubList = document.getElementById('rhythmSubList');
            const tupletSubList = document.getElementById('tupletSubList');
            const mergeSubList = document.getElementById('mergeSubList');

            // ============================================================
            //  狀態
            // ============================================================
            let audioCtx = null;
            let isPlaying = false;
            let timerId = null;
            let prepTimerId = null;
            let metronomeTimerId = null;
            let slotData = [null, null, null, null];
            let playOrder = [];
            let totalMeasures = 0;
            let bpmDisplayValue = 120;
            let beatInterval = 500;
            let metronomeEnabled = false;
            let metronomeVolume = 0.6;
            let loopCount = 4;
            let currentRound = 1;
            let contextTarget = null;

            // ============================================================
            //  音效
            // ============================================================
            function initAudioCtx() {
                if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }

            function playTick(volume = 0.4, freq = 1500) {
                try {
                    const ctx = initAudioCtx();
                    const now = ctx.currentTime;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now);
                    gain.gain.setValueAtTime(volume, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.05);
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(freq * 2, now);
                    gain2.gain.setValueAtTime(volume * 0.3, now);
                    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start(now);
                    osc2.stop(now + 0.03);
                } catch (e) {}
            }

            function playPrepBeat(volume = 0.4) { playTick(volume, 1500); }
            function playMetronomeBeat(volume = 0.6) { playTick(volume, 1500); }

            function playAccent(vol = 0.55) {
                try {
                    const ctx = initAudioCtx();
                    const now = ctx.currentTime;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(120, now);
                    osc.frequency.exponentialRampToValueAtTime(55, now + 0.08);
                    gain.gain.setValueAtTime(vol, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.12);
                    const bufSize = ctx.sampleRate * 0.04;
                    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                    const data = buf.getChannelData(0);
                    for (let i = 0; i < bufSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.3));
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buf;
                    const ng = ctx.createGain();
                    ng.gain.setValueAtTime(vol * 0.35, now);
                    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
                    noise.connect(ng);
                    ng.connect(ctx.destination);
                    noise.start(now);
                    noise.stop(now + 0.04);
                } catch (e) {}
            }

            function playLight() {}

            function playBeat(type) {
                if (type === 'accent') playAccent(0.55);
            }

            // ============================================================
            //  拍點資料管理
            // ============================================================
            function getBeatData(slotIndex, beatIndex) {
                const card = slotData[slotIndex];
                if (!card) return { accent: false, tuplet: null, inMerge: false };

                const pattern = card.pattern || ['light', 'light', 'light', 'light'];
                const overrides = card.beatOverrides || {};
                const override = overrides[beatIndex];
                const tuplets = card.beatTuplets || {};
                const tuplet = tuplets[beatIndex] || null;
                const mergeGroup = card.mergeGroup || null;

                let inMerge = false;
                let mergeType = null;
                let mergeStart = -1;
                let mergeEnd = -1;
                if (mergeGroup && beatIndex >= mergeGroup.start && beatIndex <= mergeGroup.end) {
                    inMerge = true;
                    mergeType = mergeGroup.type;
                    mergeStart = mergeGroup.start;
                    mergeEnd = mergeGroup.end;
                }

                let accent;
                if (override !== undefined && override !== null) {
                    accent = override;
                } else {
                    accent = pattern[beatIndex] === 'accent';
                }

                let finalTuplet = tuplet;
                if (inMerge && mergeType) {
                    finalTuplet = mergeType;
                }

                return {
                    accent: accent,
                    tuplet: finalTuplet,
                    inMerge: inMerge,
                    mergeType: mergeType,
                    mergeStart: mergeStart,
                    mergeEnd: mergeEnd,
                    isOverridden: (override !== undefined && override !== null),
                    rhythmHint: (card.beatRhythmHints && card.beatRhythmHints[beatIndex]) || null
                };
            }

            // ============================================================
            //  核心操作函數
            // ============================================================
            function setBeatFromRhythm(slotIndex, beatIndex, rhythmId) {
                const card = slotData[slotIndex];
                if (!card) return;
                const rhythm = RHYTHM_LIBRARY.find(r => r.id === rhythmId);
                if (!rhythm) return;

                // 儲存重/輕覆蓋
                const value = rhythm.pattern[beatIndex];
                if (!card.beatOverrides) card.beatOverrides = {};
                card.beatOverrides[beatIndex] = (value === 'accent');

                // 儲存節奏型提示（用於顯示記號）
                if (!card.beatRhythmHints) card.beatRhythmHints = {};
                card.beatRhythmHints[beatIndex] = rhythmId;

                // 設為 4 連音
                if (!card.beatTuplets) card.beatTuplets = {};
                card.beatTuplets[beatIndex] = 'quadruplet';

                renderCards();
                const patternStr = rhythm.pattern.map(p => p === 'accent' ? '◉' : '○').join('');
                statusText.textContent = `拍 ${beatIndex+1} → 常符 ${patternStr}`;
            }

            function setBeatTuplet(slotIndex, beatIndex, tupletId) {
                const card = slotData[slotIndex];
                if (!card) return;
                if (!card.beatTuplets) card.beatTuplets = {};

                // 清除合併組
                if (card.mergeGroup) {
                    const g = card.mergeGroup;
                    if (beatIndex >= g.start && beatIndex <= g.end) {
                        for (let i = g.start; i <= g.end; i++) {
                            if (card.beatTuplets) delete card.beatTuplets[i];
                            if (card.beatOverrides) delete card.beatOverrides[i];
                        }
                        delete card.mergeGroup;
                    }
                }

                if (tupletId === null) {
                    delete card.beatTuplets[beatIndex];
                } else {
                    card.beatTuplets[beatIndex] = tupletId;
                }
                renderCards();
                const info = TUPLET_TYPES.find(t => t.id === tupletId);
                statusText.textContent = `拍 ${beatIndex+1} → ${info ? info.label : ''} 連音`;
            }

            function mergeBeats(slotIndex, startBeat, tupletId) {
                const card = slotData[slotIndex];
                if (!card) return;
                if (startBeat >= 3) {
                    statusText.textContent = '⚠️ 無法合併最後一拍，請選擇前面的拍子';
                    return;
                }
                if (!card.beatTuplets) card.beatTuplets = {};

                // 清除舊合併組
                if (card.mergeGroup) {
                    const old = card.mergeGroup;
                    for (let i = old.start; i <= old.end; i++) {
                        if (card.beatTuplets) delete card.beatTuplets[i];
                        if (card.beatOverrides) delete card.beatOverrides[i];
                    }
                    delete card.mergeGroup;
                }

                // 建立新合併組
                card.mergeGroup = { start: startBeat, end: startBeat + 1, type: tupletId };
                if (card.beatTuplets) {
                    delete card.beatTuplets[startBeat];
                    delete card.beatTuplets[startBeat + 1];
                }
                if (card.beatOverrides) {
                    delete card.beatOverrides[startBeat];
                    delete card.beatOverrides[startBeat + 1];
                }

                renderCards();
                const info = TUPLET_TYPES.find(t => t.id === tupletId);
                statusText.textContent = `✅ 已合併拍 ${startBeat+1} 和 ${startBeat+2} 為 ${info ? info.label : ''} 連音`;
            }

            function resetBeat(slotIndex, beatIndex) {
                const card = slotData[slotIndex];
                if (!card) return;

                if (card.beatOverrides) delete card.beatOverrides[beatIndex];
                if (card.beatTuplets) delete card.beatTuplets[beatIndex];
                if (card.beatRhythmHints) delete card.beatRhythmHints[beatIndex];

                if (card.mergeGroup) {
                    const g = card.mergeGroup;
                    if (beatIndex >= g.start && beatIndex <= g.end) {
                        for (let i = g.start; i <= g.end; i++) {
                            if (card.beatOverrides) delete card.beatOverrides[i];
                            if (card.beatTuplets) delete card.beatTuplets[i];
                            if (card.beatRhythmHints) delete card.beatRhythmHints[i];
                        }
                        delete card.mergeGroup;
                    }
                }

                renderCards();
                statusText.textContent = `↺ 拍 ${beatIndex+1} 已重置`;
            }

            function handleBeatClick(slotIndex, beatIndex) {
                const card = slotData[slotIndex];
                if (!card) return;

                // 如果在合併組中，取消合併
                if (card.mergeGroup) {
                    const g = card.mergeGroup;
                    if (beatIndex >= g.start && beatIndex <= g.end) {
                        for (let i = g.start; i <= g.end; i++) {
                            if (card.beatTuplets) delete card.beatTuplets[i];
                            if (card.beatOverrides) delete card.beatOverrides[i];
                            if (card.beatRhythmHints) delete card.beatRhythmHints[i];
                        }
                        delete card.mergeGroup;
                        renderCards();
                        statusText.textContent = `↺ 已取消合併`;
                        return;
                    }
                }

                const current = (card.beatTuplets && card.beatTuplets[beatIndex]) || null;
                let next = null;
                if (current === null) next = 'triplet';
                else if (current === 'triplet') next = 'sextuplet';
                else next = null;

                setBeatTuplet(slotIndex, beatIndex, next);
                const names = { triplet: '三連音', sextuplet: '六連音' };
                statusText.textContent = `拍 ${beatIndex+1} → ${next ? names[next] || next : '正常'}`;
            }

            // ============================================================
            //  右鍵選單
            // ============================================================
            function showContextMenu(e, slotIndex, beatIndex) {
                e.preventDefault();
                contextTarget = { slotIndex, beatIndex };
                const menu = contextMenu;
                menu.style.display = 'block';
                let x = e.clientX;
                let y = e.clientY;
                const rect = menu.getBoundingClientRect();
                const w = rect.width || 260;
                const h = rect.height || 200;
                if (x + w > window.innerWidth) x = window.innerWidth - w - 10;
                if (y + h > window.innerHeight) y = window.innerHeight - h - 10;
                if (x < 10) x = 10;
                if (y < 10) y = 10;
                menu.style.left = x + 'px';
                menu.style.top = y + 'px';
                document.querySelectorAll('.sub-menu').forEach(sub => { sub.style.display = 'none'; });
            }

            function hideContextMenu() {
                contextMenu.style.display = 'none';
                contextTarget = null;
                document.querySelectorAll('.sub-menu').forEach(sub => { sub.style.display = 'none'; });
            }

            function toggleSubMenu(menuItem) {
                const sub = menuItem.querySelector('.sub-menu');
                if (!sub) return;
                document.querySelectorAll('.sub-menu').forEach(s => { if (s !== sub) s.style.display = 'none'; });
                sub.style.display = sub.style.display === 'block' ? 'none' : 'block';
            }

            // ============================================================
            //  渲染子清單
            // ============================================================
            function renderSubMenus() {
                // 常符子清單（16 種節奏型，只顯示拍子記號）
                rhythmSubList.innerHTML = '';
                RHYTHM_LIBRARY.forEach(r => {
                    const div = document.createElement('div');
                    div.className = 'sub-item';
                    const patternStr = r.pattern.map(p => p === 'accent' ? '◉' : '○').join(' ');
                    div.textContent = patternStr;
                    div.dataset.rhythmId = r.id;
                    div.addEventListener('click', function(e) {
                        e.stopPropagation();
                        if (!contextTarget) return;
                        const { slotIndex, beatIndex } = contextTarget;
                        setBeatFromRhythm(slotIndex, beatIndex, this.dataset.rhythmId);
                        hideContextMenu();
                    });
                    rhythmSubList.appendChild(div);
                });

                // 連音子清單
                tupletSubList.innerHTML = '';
                TUPLET_TYPES.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'sub-item';
                    div.textContent = `${t.label} 連音`;
                    div.dataset.tupletId = t.id;
                    div.addEventListener('click', function(e) {
                        e.stopPropagation();
                        if (!contextTarget) return;
                        const { slotIndex, beatIndex } = contextTarget;
                        setBeatTuplet(slotIndex, beatIndex, this.dataset.tupletId);
                        hideContextMenu();
                    });
                    tupletSubList.appendChild(div);
                });

                // 跨拍合併子清單
                mergeSubList.innerHTML = '';
                TUPLET_TYPES.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'sub-item';
                    div.textContent = `與下一拍合併 ${t.label} 連音`;
                    div.dataset.tupletId = t.id;
                    div.addEventListener('click', function(e) {
                        e.stopPropagation();
                        if (!contextTarget) return;
                        const { slotIndex, beatIndex } = contextTarget;
                        mergeBeats(slotIndex, beatIndex, this.dataset.tupletId);
                        hideContextMenu();
                    });
                    mergeSubList.appendChild(div);
                });
            }

            // ============================================================
            //  拍子機控制
            // ============================================================
            function toggleMetronome() {
                metronomeEnabled = !metronomeEnabled;
                updateMetronomeUI();
                if (metronomeEnabled && isPlaying) startMetronome();
                else stopMetronome();
            }

            function updateMetronomeUI() {
                if (metronomeEnabled) {
                    metroToggleBtn.textContent = '開';
                    metroToggleBtn.classList.add('on');
                } else {
                    metroToggleBtn.textContent = '關';
                    metroToggleBtn.classList.remove('on');
                }
            }

            function updateMetronomeVolume() {
                const val = parseInt(metroVolumeSlider.value);
                metronomeVolume = val / 100;
                metroVolDisplay.textContent = val + '%';
            }

            function startMetronome() {
                stopMetronome();
                if (!metronomeEnabled || !isPlaying) return;
                const metroBpm = bpmDisplayValue;
                const metroInterval = 60000 / metroBpm;
                metronomeTimerId = setInterval(() => {
                    playMetronomeBeat(metronomeVolume);
                }, metroInterval);
            }

            function stopMetronome() {
                if (metronomeTimerId) {
                    clearInterval(metronomeTimerId);
                    metronomeTimerId = null;
                }
            }

            // ============================================================
            //  工具
            // ============================================================
            function findCard(id) {
                return RHYTHM_LIBRARY.find(r => r.id === id) || null;
            }

            function updatePlayOrder() {
                playOrder = [];
                for (let i = 0; i < slotData.length; i++) {
                    if (slotData[i] !== null) {
                        playOrder.push({ slotIndex: i, cardId: slotData[i].id });
                    }
                }
                totalMeasures = playOrder.length;
            }

            function updateSlotCounter() {
                slotCounter.textContent = `${slotData.length} 個卡槽`;
            }

            // ============================================================
            //  渲染卡槽
            // ============================================================
            function renderCards() {
                grid.innerHTML = '';
                const totalSlots = slotData.length;

                slotData.forEach((card, index) => {
                    const isEmpty = (card === null);
                    const div = document.createElement('div');
                    div.className = 'card';
                    if (isEmpty) div.classList.add('empty-card');
                    div.dataset.slotIndex = index;
                    div.dataset.cardId = isEmpty ? '' : card.id;

                    // 編號
                    const num = document.createElement('div');
                    num.className = 'card-number';
                    if (isEmpty) num.classList.add('empty-num');
                    num.textContent = index + 1;
                    div.appendChild(num);

                    // 刪除按鈕
                    const rmBtn = document.createElement('button');
                    rmBtn.className = 'remove-btn' + (totalSlots <= 1 ? ' hidden' : '');
                    rmBtn.innerHTML = '✕';
                    rmBtn.title = '刪除這個卡槽';
                    rmBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        removeSlot(index);
                    });
                    div.appendChild(rmBtn);

                    // 下拉選單
                    const select = document.createElement('select');
                    select.dataset.slotIndex = index;
                    const emptyOption = document.createElement('option');
                    emptyOption.value = '';
                    emptyOption.textContent = '— 請選擇 —';
                    select.appendChild(emptyOption);
                    RHYTHM_LIBRARY.forEach(r => {
                        const opt = document.createElement('option');
                        opt.value = r.id;
                        const patternStr = r.pattern.map(p => p === 'accent' ? '◉' : '○').join(' ');
                        opt.textContent = patternStr;
                        select.appendChild(opt);
                    });
                    if (!isEmpty) select.value = card.id;

                    select.addEventListener('change', function(e) {
                        const slotIdx = parseInt(this.dataset.slotIndex);
                        const val = this.value;
                        if (val === '') {
                            slotData[slotIdx] = null;
                        } else {
                            const found = RHYTHM_LIBRARY.find(r => r.id === val);
                            if (found) {
                                slotData[slotIdx] = { ...found, beatOverrides: {}, beatTuplets: {},
                                    beatRhythmHints: {} };
                            }
                        }
                        const wasPlaying = isPlaying;
                        if (wasPlaying) stopPlayback(false);
                        renderCards();
                        updatePlayOrder();
                        resetCardStates();
                        resetProgress();
                        if (wasPlaying) { isPlaying = false;
                            updatePlayBtn(); }
                        updateStatus();
                    });
                    div.appendChild(select);

                    // 拍點區域
                    const beatArea = document.createElement('div');
                    beatArea.className = 'beat-area';

                    const patternDiv = document.createElement('div');
                    patternDiv.className = 'beat-pattern';

                    // 獲取卡槽的基礎節奏型（用於顯示）
                    const basePatternStr = card && card.pattern ? card.pattern.map(p => p === 'accent' ? '◉' : '○')
                        .join('') : '';

                    for (let b = 0; b < 4; b++) {
                        const container = document.createElement('div');
                        container.className = 'beat-container';

                        const dot = document.createElement('div');
                        const data = getBeatData(index, b);

                        dot.className = 'beat-dot';
                        if (data.accent) dot.classList.add('accent');
                        else dot.classList.add('light');

                        if (data.tuplet) {
                            const info = TUPLET_TYPES.find(t => t.id === data.tuplet);
                            if (info) {
                                dot.classList.add(info.dotClass);
                            }
                        }

                        if (data.inMerge) {
                            if (b === data.mergeStart) dot.classList.add('merged-start');
                            else if (b === data.mergeEnd) dot.classList.add('merged-end');
                            else dot.classList.add('merged-middle');
                        }

                        dot.textContent = data.accent ? '◉' : '○';
                        dot.dataset.beatIndex = b;
                        dot.dataset.slotIndex = index;

                        dot.addEventListener('click', function(e) {
                            e.stopPropagation();
                            const si = parseInt(this.dataset.slotIndex);
                            const bi = parseInt(this.dataset.beatIndex);
                            handleBeatClick(si, bi);
                        });

                        dot.addEventListener('contextmenu', function(e) {
                            e.stopPropagation();
                            const si = parseInt(this.dataset.slotIndex);
                            const bi = parseInt(this.dataset.beatIndex);
                            showContextMenu(e, si, bi);
                        });

                        container.appendChild(dot);

                        // ============================================================
                        //  拍點標記
                        // ============================================================
                        const label = document.createElement('div');
                        label.className = 'beat-label';
                        let labelText = '';
                        let labelClass = '';

                        // 檢查是否有常符提示（右鍵設置的節奏型記號）
                        const hintRhythmId = card && card.beatRhythmHints && card.beatRhythmHints[b];
                        const hasRhythmHint = hintRhythmId !== undefined && hintRhythmId !== null;

                        if (hasRhythmHint) {
                            const hintRhythm = RHYTHM_LIBRARY.find(r => r.id === hintRhythmId);
                            if (hintRhythm) {
                                // 顯示所選節奏型的完整記號（無空格，緊湊排列）
                                const hintStr = hintRhythm.pattern.map(p => p === 'accent' ? '◉' : '○').join('');
                                labelText = hintStr;
                                label.style.fontSize = '0.5rem';
                                label.style.color = '#8a7a7a';
                                label.style.letterSpacing = '0px';
                                label.style.fontFamily = 'monospace';
                            }
                        } else if (data.tuplet) {
                            const info = TUPLET_TYPES.find(t => t.id === data.tuplet);
                            if (info) {
                                labelText = `-${info.label}-`;
                                labelClass = info.cssClass;
                                if (data.inMerge) label.classList.add('merge-label');
                            }
                        }

                        if (labelText) {
                            label.textContent = labelText;
                            if (labelClass) label.classList.add(labelClass);
                        }
                        container.appendChild(label);

                        patternDiv.appendChild(container);
                    }

                    beatArea.appendChild(patternDiv);
                    div.appendChild(beatArea);
                    grid.appendChild(div);
                });

                updatePlayOrder();
                resetCardStates();
                resetProgress();
                updateSlotCounter();
            }

            // ============================================================
            //  卡槽管理
            // ============================================================
            function addSlot() {
                if (isPlaying) stopPlayback(false);
                slotData.push(null);
                renderCards();
                updateStatus();
                grid.scrollTop = grid.scrollHeight;
            }

            function removeSlot(index) {
                if (slotData.length <= 1) {
                    statusText.textContent = '⚠️ 至少保留 1 個卡槽';
                    return;
                }
                if (isPlaying) stopPlayback(false);
                slotData.splice(index, 1);
                renderCards();
                updateStatus();
            }

            function updateLoopSetting() {
                const val = loopSelect.value;
                if (val === '0') loopCount = 0;
                else loopCount = parseInt(val);
            }

            // ============================================================
            //  連音播放核心
            // ============================================================
            function playBeatWithSubdivisions(slotIndex, beatIndex, dotElements, card) {
                const cardData = slotData[slotIndex];
                if (!cardData) return;

                const data = getBeatData(slotIndex, beatIndex);
                if (!data.tuplet) {
                    if (dotElements && dotElements.length > beatIndex) {
                        dotElements[beatIndex].classList.add('playing');
                    }
                    if (data.accent) {
                        playAccent(0.55);
                    }
                    return;
                }

                const info = TUPLET_TYPES.find(t => t.id === data.tuplet);
                if (!info) return;

                let totalDuration = beatInterval;
                if (data.inMerge) {
                    const numBeats = data.mergeEnd - data.mergeStart + 1;
                    totalDuration = beatInterval * numBeats;
                }
                const subDivisions = info.subDivisions;
                const subInterval = totalDuration / subDivisions;

                const highlightBeats = [];
                if (data.inMerge) {
                    for (let b = data.mergeStart; b <= data.mergeEnd; b++) {
                        highlightBeats.push(b);
                    }
                } else {
                    highlightBeats.push(beatIndex);
                }

                for (let i = 0; i < subDivisions; i++) {
                    setTimeout(() => {
                        document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('playing'));
                        highlightBeats.forEach(b => {
                            if (dotElements && dotElements.length > b) {
                                dotElements[b].classList.add('playing');
                            }
                        });
                        playAccent(0.55);
                    }, i * subInterval);
                }
            }

            // ============================================================
            //  播放邏輯
            // ============================================================
            function playFromSlot(startSlotIndex) {
                if (isPlaying) stopPlayback(false);
                updatePlayOrder();
                if (playOrder.length === 0) {
                    statusText.textContent = '⚠️ 請先選擇節奏';
                    return;
                }
                updateLoopSetting();

                let startIdx = playOrder.findIndex(item => item.slotIndex === startSlotIndex);
                if (startIdx === -1) startIdx = 0;
                const ordered = [...playOrder.slice(startIdx), ...playOrder.slice(0, startIdx)];
                playOrder = ordered;
                totalMeasures = playOrder.length;
                currentRound = 1;

                clearAllHighlights();
                resetProgress();

                document.querySelectorAll('.card').forEach(el => {
                    const slotIdx = parseInt(el.dataset.slotIndex);
                    const num = el.querySelector('.card-number');
                    if (num) {
                        num.textContent = slotIdx + 1;
                        num.classList.remove('active', 'played');
                    }
                    el.classList.remove('playing-card', 'played-card', 'waiting-card');
                    const orderIdx = playOrder.findIndex(p => p.slotIndex === slotIdx);
                    if (orderIdx === -1) return;
                    if (orderIdx === 0) {
                        el.classList.remove('waiting-card');
                        el.classList.add('playing-card');
                        if (num) num.classList.add('active');
                    } else {
                        el.classList.add('waiting-card');
                    }
                });

                const firstItem = playOrder[0];
                const firstCard = findCard(firstItem.cardId);
                if (!firstCard) {
                    statusText.textContent = '⚠️ 找不到節奏資料';
                    return;
                }

                const allDots = {};
                document.querySelectorAll('.card').forEach(el => {
                    const slotIdx = parseInt(el.dataset.slotIndex);
                    const dots = el.querySelectorAll('.beat-dot');
                    if (dots && dots.length) allDots[slotIdx] = dots;
                });

                const beatsPerRound = totalMeasures * 4;
                const firstSlotIdx = firstItem.slotIndex;
                const firstDots = allDots[firstSlotIdx];

                // 準備音
                let prepCount = 0;
                const prepTotal = 4;
                const prepInterval = beatInterval;
                if (prepTimerId) { clearInterval(prepTimerId);
                    prepTimerId = null; }
                statusText.innerHTML = `⏳ 準備中...`;

                function startMainPlayback() {
                    if (prepTimerId) { clearInterval(prepTimerId);
                        prepTimerId = null; }
                    isPlaying = true;
                    updatePlayBtn();
                    if (metronomeEnabled) startMetronome();

                    const loopDisplay = (loopCount === 0) ? '∞' : loopCount;
                    statusText.innerHTML = `▶ 播放中：<strong>${firstCard.name}</strong>`;

                    playBeatWithSubdivisions(firstSlotIdx, 0, firstDots, firstCard);
                    if (metronomeEnabled) playMetronomeBeat(metronomeVolume);
                    updateProgress(0);

                    let beatCounter = 1;
                    const intervalMs = beatInterval;

                    timerId = setInterval(() => {
                        const absoluteBeat = (currentRound - 1) * beatsPerRound + beatCounter;
                        if (loopCount !== 0 && absoluteBeat >= loopCount * beatsPerRound) {
                            finishPlayback(loopDisplay);
                            return;
                        }

                        const beatInRound = beatCounter % beatsPerRound;
                        const measureIdx = Math.floor(beatInRound / 4);
                        const beatInMeasure = beatInRound % 4;

                        if (measureIdx >= playOrder.length) {
                            if (loopCount !== 0 && currentRound >= loopCount) {
                                finishPlayback(loopDisplay);
                                return;
                            }
                            currentRound++;
                            beatCounter = 0;
                            document.querySelectorAll('.card').forEach(el => {
                                const num = el.querySelector('.card-number');
                                if (num) num.classList.remove('played');
                                el.classList.remove('played-card');
                            });
                            document.querySelectorAll('.card').forEach(el => {
                                const slotIdx = parseInt(el.dataset.slotIndex);
                                const cardId = el.dataset.cardId;
                                el.classList.remove('playing-card', 'waiting-card');
                                const num = el.querySelector('.card-number');
                                if (num) num.classList.remove('active');
                                const orderIdx = playOrder.findIndex(p => p.slotIndex === slotIdx);
                                if (orderIdx === -1 || !cardId) return;
                                if (orderIdx === 0) {
                                    el.classList.add('playing-card');
                                    if (num) num.classList.add('active');
                                } else {
                                    el.classList.add('waiting-card');
                                }
                            });
                            const correctAbsoluteBeat = (currentRound - 1) * beatsPerRound;
                            updateProgress(correctAbsoluteBeat);
                            const firstCardName = findCard(playOrder[0].cardId);
                            statusText.innerHTML =
                                `▶ 播放中：<strong>${firstCardName ? firstCardName.name : ''}</strong>`;
                            document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('playing'));
                            beatCounter++;
                            return;
                        }

                        const item = playOrder[measureIdx];
                        const card = findCard(item.cardId);
                        if (!card) { beatCounter++; return; }

                        document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('playing'));

                        document.querySelectorAll('.card').forEach(el => {
                            const slotIdx = parseInt(el.dataset.slotIndex);
                            const cardId = el.dataset.cardId;
                            el.classList.remove('playing-card', 'waiting-card');
                            const num = el.querySelector('.card-number');
                            if (num) num.classList.remove('active');
                            const orderIdx = playOrder.findIndex(p => p.slotIndex === slotIdx);
                            if (orderIdx === -1 || !cardId) return;
                            if (orderIdx === measureIdx) {
                                el.classList.add('playing-card');
                                if (num) num.classList.add('active');
                            } else if (orderIdx > measureIdx) {
                                el.classList.add('waiting-card');
                            } else {
                                el.classList.add('played-card');
                                if (num) { num.classList.remove('active');
                                    num.classList.add('played'); }
                            }
                        });

                        const targetSlotIdx = item.slotIndex;
                        const targetDots = allDots[targetSlotIdx];
                        playBeatWithSubdivisions(targetSlotIdx, beatInMeasure, targetDots, card);

                        updateProgress(absoluteBeat - 1);
                        statusText.innerHTML = `▶ 播放中：<strong>${card.name}</strong>`;
                        beatCounter++;

                    }, intervalMs);
                }

                prepTimerId = setInterval(() => {
                    if (prepCount >= prepTotal) { startMainPlayback(); return; }
                    playPrepBeat(0.4);
                    prepCount++;
                }, prepInterval);
            }

            // ============================================================
            //  輔助函數
            // ============================================================
            function updateProgress(absoluteBeat) {
                const beatsPerRound = totalMeasures * 4;
                const totalBeats = (loopCount === 0) ? Infinity : loopCount * beatsPerRound;
                const pct = (loopCount === 0) ? 0 : ((absoluteBeat + 1) / totalBeats) * 100;
                progressFill.style.width = (loopCount === 0) ? '2%' : Math.min(pct, 100) + '%';
            }

            function finishPlayback(loopDisplay) {
                stopPlayback(false);
                const displayText = (loopCount === 0) ? '∞' : loopCount;
                statusText.innerHTML = `✅ ${displayText} 次循環播放完畢！`;
                document.querySelectorAll('.card').forEach(el => {
                    el.classList.remove('playing-card', 'waiting-card');
                    const slotIdx = parseInt(el.dataset.slotIndex);
                    const orderIdx = playOrder.findIndex(p => p.slotIndex === slotIdx);
                    if (orderIdx !== -1 && el.dataset.cardId) {
                        el.classList.add('played-card');
                    }
                    const num = el.querySelector('.card-number');
                    if (num) {
                        num.classList.remove('active');
                        if (orderIdx !== -1 && el.dataset.cardId) {
                            num.classList.add('played');
                        }
                    }
                });
                document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('playing'));
                progressFill.style.width = '100%';
            }

            function playFullSequence() {
                updatePlayOrder();
                if (playOrder.length === 0) {
                    statusText.textContent = '⚠️ 請先選擇節奏';
                    return;
                }
                const firstSlot = playOrder[0].slotIndex;
                playFromSlot(firstSlot);
            }

            // ============================================================
            //  控制
            // ============================================================
            function stopPlayback(keepState = false) {
                if (timerId) { clearInterval(timerId);
                    timerId = null; }
                if (prepTimerId) { clearInterval(prepTimerId);
                    prepTimerId = null; }
                stopMetronome();
                isPlaying = false;
                if (!keepState) updatePlayBtn();
            }

            function togglePlayPause() {
                if (isPlaying) {
                    stopPlayback(true);
                    isPlaying = false;
                    updatePlayBtn();
                    statusText.textContent = '⏸ 已暫停';
                } else {
                    const playedCount = document.querySelectorAll('.card.played-card').length;
                    if (playedCount > 0 && playedCount === playOrder.length) {
                        resetCardStates();
                        resetProgress();
                        document.querySelectorAll('.card').forEach(el => {
                            el.classList.remove('played-card');
                            const num = el.querySelector('.card-number');
                            if (num) num.classList.remove('played');
                        });
                        playFullSequence();
                    } else {
                        const active = document.querySelector('.card.playing-card');
                        if (active && active.dataset.cardId) {
                            const slotIdx = parseInt(active.dataset.slotIndex);
                            playFromSlot(slotIdx);
                        } else {
                            playFullSequence();
                        }
                    }
                }
            }

            function updatePlayBtn() {
                if (isPlaying) {
                    playLabel.textContent = '暫停';
                    playBtn.querySelector('.btn-icon').textContent = '⏸';
                } else {
                    playLabel.textContent = '播放';
                    playBtn.querySelector('.btn-icon').textContent = '▶';
                }
            }

            function updateStatus() {
                const count = slotData.filter(c => c !== null).length;
                if (count === 0) {
                    statusText.innerHTML = '🎵 選擇節奏或按「隨機」開始';
                } else {
                    const loopDisplay = (loopCount === 0) ? '∞' : loopCount;
                    statusText.innerHTML =
                        `🎵 已選擇 ${count} 個節奏 · 循環 ${loopDisplay} 次 · 按「播放」聆聽`;
                }
            }

            // ============================================================
            //  UI 輔助
            // ============================================================
            function clearAllHighlights() {
                document.querySelectorAll('.card').forEach(c => {
                    c.classList.remove('playing-card', 'played-card', 'waiting-card');
                });
                document.querySelectorAll('.card-number').forEach(n => {
                    n.classList.remove('active', 'played');
                });
                document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('playing'));
            }

            function resetCardStates() {
                clearAllHighlights();
                document.querySelectorAll('.card-number').forEach((n) => {
                    n.classList.remove('active', 'played');
                });
            }

            function resetProgress() {
                progressFill.style.width = '0%';
            }

            // ============================================================
            //  隨機 / 清空
            // ============================================================
            function randomAssign() {
                if (isPlaying) stopPlayback(false);
                const shuffled = [...RHYTHM_LIBRARY];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                const totalSlots = slotData.length;
                for (let i = 0; i < totalSlots; i++) {
                    if (i < shuffled.length) {
                        slotData[i] = { ...shuffled[i], beatOverrides: {}, beatTuplets: {}, beatRhythmHints: {} };
                    } else {
                        const shuffledAgain = [...RHYTHM_LIBRARY];
                        for (let k = shuffledAgain.length - 1; k > 0; k--) {
                            const l = Math.floor(Math.random() * (k + 1));
                            [shuffledAgain[k], shuffledAgain[l]] = [shuffledAgain[l], shuffledAgain[k]];
                        }
                        slotData[i] = { ...shuffledAgain[i % shuffledAgain.length], beatOverrides: {},
                            beatTuplets: {}, beatRhythmHints: {} };
                    }
                }
                renderCards();
                updatePlayOrder();
                resetCardStates();
                resetProgress();
                updateStatus();
                if (isPlaying) { isPlaying = false;
                    updatePlayBtn(); }
                updatePlayBtn();
            }

            function clearAll() {
                if (isPlaying) stopPlayback(false);
                for (let i = 0; i < slotData.length; i++) {
                    slotData[i] = null;
                }
                renderCards();
                updatePlayOrder();
                resetCardStates();
                resetProgress();
                statusText.textContent = '🗑 已清空所有節奏';
                if (isPlaying) { isPlaying = false;
                    updatePlayBtn(); }
                updatePlayBtn();
            }

            // ============================================================
            //  BPM
            // ============================================================
            function updateBpm(val) {
                bpmDisplayValue = Math.min(160, Math.max(60, Number(val)));
                bpmDisplay.textContent = bpmDisplayValue;
                beatInterval = 60000 / bpmDisplayValue;
                if (isPlaying) {
                    const active = document.querySelector('.card.playing-card');
                    if (active && active.dataset.cardId) {
                        const slotIdx = parseInt(active.dataset.slotIndex);
                        stopPlayback(false);
                        setTimeout(() => playFromSlot(slotIdx), 50);
                    }
                }
            }

            // ============================================================
            //  初始化
            // ============================================================
            function init() {
                slotData = [null, null, null, null];
                renderCards();
                updatePlayOrder();
                updateLoopSetting();
                updateMetronomeUI();
                renderSubMenus();
                statusText.innerHTML =
                    '🎵 點擊拍點切換模式 · 右鍵拍點設定 ' +
                    '<span class="hint-key">｜左鍵：正常↔三連音↔六連音 ｜右鍵：常符/連音/跨拍合併</span>';

                bpmSlider.addEventListener('input', function(e) {
                    const val = e.target.value;
                    bpmDisplay.textContent = val;
                    updateBpm(val);
                });

                loopSelect.addEventListener('change', function() {
                    updateLoopSetting();
                    updateStatus();
                    if (isPlaying) {
                        const active = document.querySelector('.card.playing-card');
                        if (active && active.dataset.cardId) {
                            const slotIdx = parseInt(active.dataset.slotIndex);
                            stopPlayback(false);
                            setTimeout(() => playFromSlot(slotIdx), 50);
                        }
                    }
                });

                metroToggleBtn.addEventListener('click', toggleMetronome);
                metroVolumeSlider.addEventListener('input', updateMetronomeVolume);
                addSlotBtn.addEventListener('click', addSlot);
                playBtn.addEventListener('click', togglePlayPause);
                randomBtn.addEventListener('click', randomAssign);
                clearBtn.addEventListener('click', clearAll);

                // 子清單點擊展開
                document.querySelectorAll('.menu-item.has-sub').forEach(item => {
                    item.addEventListener('click', function(e) {
                        e.stopPropagation();
                        toggleSubMenu(this);
                    });
                });

                // 點擊其他地方關閉右鍵選單
                document.addEventListener('click', function(e) {
                    if (!contextMenu.contains(e.target)) hideContextMenu();
                });
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') hideContextMenu();
                });

                // 右鍵選單「重置」項目
                contextMenu.querySelectorAll('.menu-item:not(.has-sub)').forEach(item => {
                    item.addEventListener('click', function() {
                        const action = this.dataset.action;
                        if (!contextTarget) { hideContextMenu(); return; }
                        const { slotIndex, beatIndex } = contextTarget;
                        if (action === 'reset') {
                            resetBeat(slotIndex, beatIndex);
                        }
                        hideContextMenu();
                    });
                });

                document.addEventListener('keydown', function(e) {
                    if (e.key === ' ' || e.code === 'Space') {
                        e.preventDefault();
                        togglePlayPause();
                    }
                });

                document.addEventListener('click', function() {
                    if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }, { once: true });
            }

            init();
        })();
    </script>
</body>
</html>
